# This workflow refreshes the CI cache for Go by download mod dependencies
# and tools.
name: Refresh Go Cache (Export)

on:
  workflow_call:
    inputs:
      runner:
        type: string
        description: The runner to refresh cache for
        default: ubuntu-24.04
      go:
        type: string
        description: The Go version to refresh cache for. If unset, reads from go.work
        default: ""

jobs:
  refresh:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ !inputs.go && 'go.work' || '' }}
          go-version: ${{ inputs.go }}
          cache: false

      - run: go run ./build download

      - name: resolve environment
        id: goenv
        shell: bash
        run: |
          {
            echo "go_cache=$(go env GOCACHE)"
            echo "go_modcache=$(go env GOMODCACHE)"
            echo "go_version=$(go env GOVERSION)"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.goenv.outputs.go_modcache }}
          key: gomod-${{ runner.os }}-${{ steps.goenv.outputs.go_version }}-${{ hashFiles('**/go.mod', '**/versions.go') }}

      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.goenv.outputs.go_cache }}
          key: gocache-${{ runner.os }}-${{ steps.goenv.outputs.go_version }}-${{ hashFiles('**/go.mod', '**/versions.go') }}
